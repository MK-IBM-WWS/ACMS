version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: acms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: acms
      POSTGRES_PASSWORD: CV6Enterprise
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "228:5432"
    volumes:
      - ./acms_db:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3
